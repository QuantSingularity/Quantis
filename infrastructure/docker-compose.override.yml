# Local development overrides - NOT for production
# Automatically applied when running: docker compose up
version: "3.8"

services:
  api:
    build:
      context: ../
      dockerfile: infrastructure/Dockerfile.api
    volumes:
      - ../:/app
    environment:
      - LOG_LEVEL=debug
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  db:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"

  mlflow:
    ports:
      - "5000:5000"
