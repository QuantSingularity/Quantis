apiVersion: v1
kind: Secret
metadata:
  name: quantis-secrets
  namespace: default
type: Opaque
stringData:
  database-url: "mysql://appuser:CHANGE_ME@quantis-database:3306/quantisdb"
  mysql-root-password: "CHANGE_ME"
  mysql-password: "CHANGE_ME"
  jwt-secret: "CHANGE_ME"
  redis-password: "CHANGE_ME"
  api-key: "CHANGE_ME"
# To create the actual secret:
# 1. Copy this file to app-secrets.yaml
# 2. Replace all CHANGE_ME values with actual secrets
# 3. Apply: kubectl apply -f app-secrets.yaml
# 4. DO NOT commit app-secrets.yaml to version control
# Consider using Sealed Secrets or External Secrets Operator in production
