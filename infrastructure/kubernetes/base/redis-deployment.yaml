apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantis-redis
  labels:
    app: quantis-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantis-redis
  template:
    metadata:
      labels:
        app: quantis-redis
    spec:
      containers:
        - name: quantis-redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
          resources:
            limits:
              cpu: 300m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: quantis-redis-data
              mountPath: /data
      volumes:
        - name: quantis-redis-data
          persistentVolumeClaim:
            claimName: quantis-redis-pvc
