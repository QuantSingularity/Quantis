---
- name: Update all packages
  yum:
    name: "*"
    state: latest
    update_only: yes

- name: Install common packages
  yum:
    name:
      - vim
      - git
      - wget
      - unzip
      - htop
      - net-tools
      - python3
      - python3-pip
      - curl
    state: present

- name: Set timezone
  community.general.timezone:
    name: UTC

- name: Start and enable firewalld
  systemd:
    name: firewalld
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Configure firewall for HTTP
  ansible.posix.firewalld:
    service: http
    permanent: yes
    state: enabled
    immediate: yes
  when: ansible_os_family == "RedHat"

- name: Configure firewall for HTTPS
  ansible.posix.firewalld:
    service: https
    permanent: yes
    state: enabled
    immediate: yes
  when: ansible_os_family == "RedHat"

- name: Configure firewall for SSH
  ansible.posix.firewalld:
    service: ssh
    permanent: yes
    state: enabled
    immediate: yes
  when: ansible_os_family == "RedHat"

- name: Ensure NTP is installed and running
  yum:
    name: chrony
    state: present

- name: Start and enable chrony
  systemd:
    name: chronyd
    state: started
    enabled: yes
