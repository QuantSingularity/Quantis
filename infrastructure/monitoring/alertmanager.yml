global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alertmanager@quantis.example.com"
  smtp_auth_username: "alertmanager@quantis.example.com"
  smtp_auth_password: "${SMTP_PASSWORD}"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    email_configs:
      - to: "ops-team@quantis.example.com"
        send_resolved: true

  - name: "critical"
    email_configs:
      - to: "oncall@quantis.example.com"
        send_resolved: true
    # Uncomment and configure for PagerDuty:
    # pagerduty_configs:
    #   - routing_key: "${PAGERDUTY_ROUTING_KEY}"
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
